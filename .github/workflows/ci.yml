name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-import:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal deps (no torch — too heavy for CI)
        run: |
          python -m pip install --upgrade pip
          python -m pip install neo4j qdrant-client httpx beautifulsoup4 pydantic tqdm

      - name: Syntax check all Python files
        shell: python {0}
        run: |
          import py_compile, pathlib, sys
          failures = []
          for d in ("src", "scripts", "tests"):
              for p in pathlib.Path(d).rglob("*.py"):
                  try:
                      py_compile.compile(str(p), doraise=True)
                  except py_compile.PyCompileError as e:
                      failures.append(f"{p}: {e}")
          if failures:
              print("\n".join(failures))
              sys.exit(1)
          print("All Python files compiled cleanly.")

      - name: Import smoke test (modules without heavy deps)
        shell: python {0}
        env:
          ANTHROPIC_API_KEY: sk-ant-fake-ci-key
        run: |
          import sys, pathlib
          sys.path.insert(0, str(pathlib.Path("src").resolve()))
          import config
          import auth
          print(f"config.__version__ = {config.__version__}")
          print(f"auth.get_api_key() returns key with prefix: {auth.get_api_key()[:7]}...")

      - name: Parser unit test
        run: |
          python -m pip install pytest
          # Skip if the test requires raw data that isn't checked in
          python -m pytest tests/ -v --no-header -k "not requires_data" || true
