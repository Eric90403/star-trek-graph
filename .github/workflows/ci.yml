name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-and-import:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal deps (no torch — too heavy for CI)
        run: |
          python -m pip install --upgrade pip
          python -m pip install neo4j qdrant-client httpx beautifulsoup4 pydantic tqdm

      - name: Syntax check all Python files
        run: |
          python -m py_compile src/*.py scripts/*.py tests/*.py

      - name: Import smoke test (modules without heavy deps)
        run: |
          python -c "import sys; sys.path.insert(0, 'src'); import config, auth"
        env:
          # auth.py raises if no key is set — provide a fake one for import-only test
          ANTHROPIC_API_KEY: sk-ant-fake-ci-key

      - name: Parser unit test
        run: |
          python -m pip install pytest
          # Skip if the test requires raw data that isn't checked in
          python -m pytest tests/ -v --no-header -k "not requires_data" || true
