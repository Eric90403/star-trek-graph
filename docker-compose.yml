services:
  neo4j:
    image: neo4j:5.26-community
    container_name: trek-neo4j
    ports:
      - "7475:7474"   # HTTP browser
      - "7688:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/trekgraph
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
    volumes:
      - trek_neo4j_data:/data
      - trek_neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "trekgraph", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  trek_neo4j_data:
  trek_neo4j_logs:
